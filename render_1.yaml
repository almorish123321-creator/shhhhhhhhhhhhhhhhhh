services:
  # 1. خدمة الموقع الإلكتروني (Static Site)
  - type: static
    name: seha-website
    env: static
    buildCommand: "" 
    publishPath: "website"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"

  # 2. خدمة البوت (Background Worker)
  - type: worker
    name: seha-bot
    env: python
    # تم تبسيط أمر البناء لإزالة محاولة تثبيت Rust وتجنب خطأ الصلاحيات
    buildCommand: "pip install --upgrade pip && pip install -r bot/requirements.txt"
    startCommand: "python bot/bot_updated.py"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10" # استخدام نسخة مستقرة ومدعومة
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: API_BASE_URL
        value: "https://seha-website.onrender.com"
      - key: API_ENDPOINT
        value: "/api/add_leave.php"
